services:
  cpp-interview-lab:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      FLASHCARDS_HOST: 0.0.0.0
      FLASHCARDS_PORT: 8000
      FLASHCARDS_STATE_DIR: /data
    volumes:
      - ./data:/data
      - ./cpp_awssome_project/random_pj:/app/cpp_awssome_project/random_pj
